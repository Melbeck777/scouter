spring.application.name=scouter

# EDINET API. The real key is provided via the EDINET_API_KEY environment
# variable; the empty default (":") keeps the app context loadable in tests
# and CI where the secret is absent. Never hard-code the key here.
edinet.api-key=${EDINET_API_KEY:}
edinet.base-url=https://api.edinet-fsa.go.jp/api/v2
